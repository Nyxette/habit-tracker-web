<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Habit Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
    :root {
        --primary:       #7C5CFF;
        --primary-soft:  rgba(124, 92, 255, 0.14);
        --primary-glow:  rgba(124, 92, 255, 0.35);
        --secondary:     #FF6B9D;
        --accent:        #FFB703;
        --success:       #34D399;
        --success-soft:  rgba(52, 211, 153, 0.15);
        --danger:        #F87171;
        --danger-soft:   rgba(248, 113, 113, 0.15);
        --warning:       #FBBF24;
        --bg:            #0F0E1A;
        --bg2:           #16152A;
        --card:          #1C1B33;
        --card2:         #221F3B;
        --text-primary:  #F0EEFF;
        --text-secondary:#9590B8;
        --text-muted:    #5E5A7A;
        --border:        rgba(124, 92, 255, 0.18);
        --border-subtle: rgba(255,255,255,0.06);
        --sidebar-bg:    rgba(11, 10, 24, 0.7);
        --sidebar-width: 230px;
        --navbar-h:      62px;
        --radius:        14px;
        --radius-sm:     9px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: var(--bg);
        color: var(--text-primary);
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* Subtle noise texture overlay */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.4;
    }

    /* ── Navbar ── */
    .ht-navbar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: var(--navbar-h);
        background: rgba(11, 10, 24, 0.01);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        z-index: 200;
        border-bottom: 1px solid var(--border-subtle);
    }

    .ht-navbar .brand {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Sora', sans-serif;
        font-weight: 800;
        font-size: 1.05rem;
        color: var(--text-primary);
        letter-spacing: -0.01em;
        display: flex;
        align-items: center;
        gap: 0.45rem;
        white-space: nowrap;
    }

    .brand-dot {
        width: 8px; height: 8px;
        background: var(--primary);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--primary);
        animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
        0%, 100% { box-shadow: 0 0 6px var(--primary); }
        50% { box-shadow: 0 0 18px var(--primary), 0 0 30px var(--primary-soft); }
    }

    .ht-navbar .nav-right {
        margin-left: auto;
        font-family: 'Sora', sans-serif;
        font-size: 0.78rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        letter-spacing: 0.02em;
    }

    .nav-page-tag {
        background: var(--primary-soft);
        color: var(--primary);
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        font-size: 0.72rem;
        font-weight: 600;
        border: 1px solid var(--border);
        letter-spacing: 0.05em;
        text-transform: uppercase;
    }

    .hamburger-btn {
        background: none;
        border: 1px solid var(--border-subtle);
        color: var(--text-secondary);
        font-size: 1rem;
        cursor: pointer;
        padding: 0.35rem 0.55rem;
        border-radius: 8px;
        transition: all 0.2s;
        line-height: 1;
        z-index: 1;
    }
    .hamburger-btn:hover {
        background: var(--primary-soft);
        border-color: var(--border);
        color: var(--text-primary);
    }

    /* ── Layout ── */
    .ht-layout {
        display: flex;
        padding-top: var(--navbar-h);
        min-height: 100vh;
        position: relative;
        z-index: 1;
    }

    /* ── Sidebar ── */
    #sidebar {
        width: var(--sidebar-width);
        min-height: calc(100vh - var(--navbar-h));
        background: var(--sidebar-bg);
        padding: 1.75rem 0.9rem 2rem;
        flex-shrink: 0;
        transition: width 0.3s cubic-bezier(.4,0,.2,1), padding 0.3s cubic-bezier(.4,0,.2,1);
        overflow: hidden;
        position: relative;
        border-right: 1px solid var(--border-subtle);
    }

    #sidebar::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 240px;
        background: radial-gradient(ellipse at bottom left, rgba(124,92,255,0.12) 0%, transparent 70%);
        pointer-events: none;
    }

    #sidebar.collapsed {
        width: 0;
        padding: 1.75rem 0 2rem;
    }

    .sidebar-section-label {
        font-family: 'Sora', sans-serif;
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
        padding: 0 0.7rem;
        margin-bottom: 0.6rem;
        white-space: nowrap;
    }

    .sidebar-nav { list-style: none; padding: 0; }
    .sidebar-nav li + li { margin-top: 0.2rem; }

    .sidebar-nav a {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        padding: 0.7rem 0.9rem;
        border-radius: var(--radius-sm);
        color: var(--text-secondary);
        text-decoration: none;
        font-family: 'Sora', sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        white-space: nowrap;
        transition: all 0.2s ease;
        position: relative;
    }

    .sidebar-nav a:hover {
        background: rgba(255,255,255,0.05);
        color: var(--text-primary);
    }

    .sidebar-nav a.active {
        background: linear-gradient(135deg, rgba(124,92,255,0.25), rgba(124,92,255,0.1));
        color: #fff;
        border: 1px solid rgba(124,92,255,0.3);
    }

    .sidebar-nav a.active .sidebar-icon {
        filter: none;
    }

    .sidebar-nav a::before {
        content: '';
        position: absolute;
        left: 0; top: 50%; transform: translateY(-50%);
        width: 3px; height: 0;
        background: var(--primary);
        border-radius: 0 2px 2px 0;
        transition: height 0.2s;
    }

    .sidebar-nav a.active::before { height: 60%; }

    .sidebar-icon {
        width: 20px;
        text-align: center;
        font-size: 1rem;
        flex-shrink: 0;
    }

    .sidebar-divider {
        height: 1px;
        background: var(--border-subtle);
        margin: 1rem 0.7rem;
    }

    /* ── Main Content ── */
    .ht-main {
        flex: 1;
        padding: 2.25rem 2.5rem;
        min-width: 0;
        animation: fade-in 0.35s ease;
    }

    @keyframes fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Cards ── */
    .ht-card {
        background: rgba(28,27,51,0.75);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius);
        transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }

    .ht-card:hover {
        transform: translateY(-2px);
        border-color: var(--border);
        box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .ht-card-glass {
        background: rgba(28,27,51,0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius);
    }

    /* ── Page Heading ── */
    .ht-heading {
        font-family: 'Sora', sans-serif;
        font-weight: 800;
        font-size: 1.85rem;
        color: var(--text-primary);
        margin-bottom: 0.25rem;
        letter-spacing: -0.02em;
    }

    .ht-subheading {
        font-size: 0.9rem;
        color: var(--text-secondary);
        margin-bottom: 1.75rem;
    }

    .ht-heading-underline {
        width: 40px;
        height: 3px;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        margin-bottom: 1.5rem;
    }

    /* ── Stat Pill ── */
    .stat-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.3rem 0.75rem;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 600;
        font-family: 'Sora', sans-serif;
    }

    .stat-pill.good  { background: var(--success-soft); color: var(--success); border: 1px solid rgba(52,211,153,0.25); }
    .stat-pill.bad   { background: var(--danger-soft);  color: var(--danger);  border: 1px solid rgba(248,113,113,0.25); }

    /* ── Buttons ── */
    .btn {
        border-radius: var(--radius-sm);
        font-weight: 500;
        font-family: 'DM Sans', sans-serif;
        transition: all 0.18s ease;
        letter-spacing: 0.01em;
    }
    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
        background: var(--primary);
        border: none;
        color: #fff;
        box-shadow: 0 4px 16px var(--primary-glow);
    }
    .btn-primary:hover {
        background: #6a4de8;
        box-shadow: 0 6px 22px var(--primary-glow);
        color: #fff;
    }

    .btn-outline-primary {
        background: transparent;
        border: 1.5px solid var(--primary);
        color: var(--primary);
    }
    .btn-outline-primary:hover {
        background: var(--primary-soft);
        color: var(--primary);
        border-color: var(--primary);
    }

    .btn-ghost {
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border-subtle);
        color: var(--text-secondary);
        font-size: 0.8rem;
        padding: 0.35rem 0.8rem;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.09); color: var(--text-primary); }

    .btn-log {
        background: var(--success-soft);
        border: 1px solid rgba(52,211,153,0.3);
        color: var(--success);
        font-size: 0.8rem;
        padding: 0.4rem 1rem;
        display: inline-flex; align-items: center; gap: 0.35rem;
    }
    .btn-log:hover {
        background: rgba(52,211,153,0.25);
        color: var(--success);
        box-shadow: 0 4px 14px rgba(52,211,153,0.2);
    }

    .btn-danger-soft {
        background: var(--danger-soft);
        border: 1px solid rgba(248,113,113,0.25);
        color: var(--danger);
        font-size: 0.8rem;
        padding: 0.35rem 0.75rem;
        display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .btn-danger-soft:hover { background: rgba(248,113,113,0.25); color: var(--danger); }

    .btn-edit {
        background: rgba(251,191,36,0.1);
        border: 1px solid rgba(251,191,36,0.25);
        color: var(--warning);
        font-size: 0.8rem;
        padding: 0.35rem 0.75rem;
        display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .btn-edit:hover { background: rgba(251,191,36,0.18); color: var(--warning); }

    /* ── Form controls ── */
    .form-control, .form-select {
        background: rgba(255,255,255,0.05);
        border: 1.5px solid var(--border-subtle);
        color: var(--text-primary);
        border-radius: var(--radius-sm);
        font-family: 'DM Sans', sans-serif;
        transition: all 0.2s;
    }
    .form-control::placeholder { color: var(--text-muted); }
    .form-control:focus, .form-select:focus {
        background: rgba(255,255,255,0.07);
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(124,92,255,0.18);
        color: var(--text-primary);
        outline: none;
    }
    .form-select option {
        background: var(--card2);
        color: var(--text-primary);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Table ── */
    .ht-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 0.4rem;
    }
    .ht-table thead th {
        font-family: 'Sora', sans-serif;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
        padding: 0.5rem 1rem;
        background: transparent;
        border: none;
    }
    .ht-table tbody tr td {
        background: var(--card);
        border-top: 1px solid var(--border-subtle);
        border-bottom: 1px solid var(--border-subtle);
        padding: 0.9rem 1rem;
        font-size: 0.9rem;
        vertical-align: middle;
    }
    .ht-table tbody tr td:first-child {
        border-left: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    }
    .ht-table tbody tr td:last-child {
        border-right: 1px solid var(--border-subtle);
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .ht-table tbody tr:hover td { background: var(--card2); }

    /* ── Icon Grid ── */
    .icon-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        max-width: 320px;
    }

    .icon-btn {
        width: 36px; height: 36px;
        border-radius: 8px;
        border: 1.5px solid var(--border-subtle);
        background: rgba(255,255,255,0.04);
        cursor: pointer;
        font-size: 1.1rem;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.15s;
        user-select: none;
    }
    .icon-btn:hover, .icon-btn.selected {
        border-color: var(--primary);
        background: var(--primary-soft);
        box-shadow: 0 0 10px var(--primary-soft);
    }

    /* ── Toggle switch ── */
    .type-toggle {
        display: flex;
        gap: 0.5rem;
    }
    .type-btn {
        flex: 1;
        padding: 0.5rem;
        border-radius: var(--radius-sm);
        border: 1.5px solid var(--border-subtle);
        background: transparent;
        color: var(--text-secondary);
        font-family: 'Sora', sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
    }
    .type-btn.good.active { background: var(--success-soft); border-color: rgba(52,211,153,0.4); color: var(--success); }
    .type-btn.bad.active  { background: var(--danger-soft);  border-color: rgba(248,113,113,0.4); color: var(--danger); }

    /* animations */
    @keyframes slide-down {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: slide-down 0.25s ease forwards; }


    .log-type-option {
        display:flex; align-items:center; gap:0.5rem;
        padding:0.4rem 0.75rem;
        border-radius:var(--radius-sm);
        border:1px solid var(--border-subtle);
        cursor:pointer; font-size:0.82rem;
        color:var(--text-secondary);
        transition:all 0.15s;
    }
    .log-type-option:has(input:checked) {
        border-color:var(--primary);
        background:var(--primary-soft);
        color:var(--text-primary);
    }
    .log-type-option input[type="radio"] { display:none; }


    </style>
</head>
<body>

    <div style="position:fixed; top:200px; left:-100px; width:600px; height:600px;
        background:radial-gradient(circle, rgba(108,60,255,0.50) 0%, transparent 65%);
        pointer-events:none; z-index:0;"></div>

    <div style="position:fixed; top:-80px; right:-80px; width:500px; height:500px;
        background:radial-gradient(circle, rgba(220,50,80,0.40) 0%, transparent 65%);
        pointer-events:none; z-index:0;"></div>


    <!-- Navbar -->
    <nav class="ht-navbar">
        <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
        <div class="brand">
            <div class="brand-dot"></div>
            Habit Tracker
        </div>
        <div class="nav-right">
            <span class="nav-page-tag">{% block title %}{% endblock %}</span>
        </div>
    </nav>

    <div class="ht-layout">
        <!-- Sidebar -->
        <div id="sidebar">
            <div class="sidebar-section-label">Navigation</div>
            <ul class="sidebar-nav">
                <li>
                    <a href="/" class="{% if request.path == '/' %}active{% endif %}">
                        <span class="sidebar-icon">🏠</span> Home
                    </a>
                </li>
                <li>
                    <a href="/stats" class="{% if 'stats' in request.path %}active{% endif %}">
                        <span class="sidebar-icon">📊</span> Stats
                    </a>
                </li>
                <li>
                    <a href="/habits" class="{% if request.path == '/habits' %}active{% endif %}">
                        <span class="sidebar-icon">📋</span> Habits
                    </a>
                </li>
            </ul>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section-label">Account</div>
            <ul class="sidebar-nav">
                <li>
                    <a href="/profile" class="{% if request.path == '/profile' %}active{% endif %}">
                        <span class="sidebar-icon">👤</span> Profile
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main -->
        <main class="ht-main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
