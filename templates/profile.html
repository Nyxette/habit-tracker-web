{% extends "base.html" %}

{%block title %} Profile {% endblock %}

{% block content %}
<div class="d-flex gap-5 mt-4" style="width: 100%;">
    
    <!-- Left side: stats -->
    <div style="flex: 1;">
        <h2>Profile Stats</h2>
        <table class="table table-bordered w-100">
            <tr><td>Total Habits</td><td>{{ habit_count }}</td></tr>
            <tr><td>Total Logs</td><td>{{ total_logs_ever }}</td></tr>
            <tr><td>Member Since</td><td>{{ earliest_date }}</td></tr>
            <tr><td>Most Consistent</td><td>{{ consistent_habit[0] }}</td></tr>
        </table>
    </div>

    <!-- Right side: profile -->
    <div style="flex: 1;" class="d-flex flex-column align-items-center justify-content-center">
        <img src="https://imgs.search.brave.com/Fklr9lVEKVtI9P6bGsutARciqsVZzBXxG0V_lerXYKM/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9wcmV2/aWV3LnJlZGQuaXQv/dGhhbmtzLWktaGF0/ZS1jaGFkLWhvcnNl/LXYwLW12NjE0aXRv/YTE4NzEucG5nP3dp/ZHRoPTY0MCZjcm9w/PXNtYXJ0JmF1dG89/d2VicCZzPWIxN2Nk/ZWRmZjRhNGRlYzdk/ZDIxODQ1MmEyYzg1/OGRlMTUzN2U4NjE" width="200" style="border-radius: 50%;">

</div>
