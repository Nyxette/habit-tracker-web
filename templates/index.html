{% extends "base.html" %}
{%block title %} Home {% endblock %}
{% block content %}
    <div>
        <h1>My Habits</h1>
        {% for habit in habits %}
        <div class="card mb-3">
            <div class="card-body d-flex justify-content-between align-items-center">
                <span>{{habit[1]}}</span>  
                <div>
                    <a href="/stats/{{ habit[0] }}" class="btn btn-info btn-sm">Stats</a>
                    <form action="/log/{{habit[0]}}" method="POST" class="d-inline">
                        <button type="submit" class="btn btn-success btn-sm">Log</button>
                    </form>
                    <form action="/delete/{{habit[0]}}" method="POST" class="d-inline">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </div>

            </div>
        </div>
        {%endfor %}
        <div class="card mt-4 p-3" style="max-width: 400px;">
            <h5>Add New Habit</h5>
            <form action="/add" method="POST" class="d-flex gap-2">
                <input type="text" name="habit_name" placeholder="Enter habit name" class="form-control">
                <button type="submit" class="btn btn-primary">Add</button>
            </form>
        </div>
    </div>
{% endblock %}
